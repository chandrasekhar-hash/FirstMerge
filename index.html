<!-- what exists on the page -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstMerge</title>

    <!-- link with all css files -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">

</head>

<body>

    <!-- Video Background -->
    <video autoplay loop muted playsinline id="bg-video">
        <source src="backgroundUi.mp4" type="video/mp4">
    </video>
    <!-- Overlay to keep text readable -->
    <div id="video-overlay"></div>
        <!-- Header - Top bar  -->
        <header class="header">
            <div class="header-inner">
                <span class="logo">FirstMerge</span>
            </div>
        </header>


        <!-- page layout -->
        <div class="container">

            <!-- Left side bar -->
            <aside class="sidebar">
                <p class="sidebar-label">Language</p>
                <select id="language-filter">
                  <option value="">All</option>
                  <option value="javascript">JavaScript</option>
                  <option value="html">HTML</option>
                  <option value="css">CSS</option>
                  <option value="typescript">TypeScript</option>
                  <option value="python">Python</option>
                </select>
                <!-- after milestone 4 -->

                <p class="sidebar-label">Difficulty</p>
                <button id="level-beginner">Beginner</button>
                <button id="level-intermediate">Intermediate</button>
                <button id="level-advanced">Advanced</button>
                <button id="level-all">All</button>
            </aside>


            <!-- Right Side -->
            <main class="main">
                <input type="text" id="search-input" placeholder="search issues or repos..." />

                <div id="issue-feed"></div>
            </main>
        </div>


        <!-- Profile Modal -->
        <div id="profile-modal" class="hidden">

            <h3>Setup Profile</h3>

            <label>Language</label>
            <select id="profile-language">
                <option value="JavaScript">JavaScript</option>
                <option value="Python">Python</option>
                <option value="Java">Java</option>
            </select>

            <label>Level</label>
            <select id="profile-level">
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
            </select>

            <label>Hours/week</label>
            <input type="number" id="profile-time">

            <button id="save-profile">Save</button>

        </div>


        <script src="js/api.js"></script>
        <script src="js/app.js"></script>
        <script src="js/storage.js"></script>  

</body>
</html>
